<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Dock</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500&family=JetBrains+Mono:wght@200;300;400&display=swap");

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: "Outfit", sans-serif;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    /* ── Window layout: 280px tall. Bottom 80px = dock. Top 200px = search/overlay ── */
    .dock-root {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      pointer-events: none;  /* transparent top area passes through to OS */
      z-index: 1;
    }

    /* Search overlay area (top 200px) */
    .search-area {
      width: 100%; flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 8px;
      pointer-events: none;
    }
    .search-area.open { pointer-events: auto; }

    /* Dock bar (bottom 80px) - always receives pointer events via JS */
    .dock-bottom {
      width: 100%; height: 80px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 10px; gap: 8px;
      flex-shrink: 0;
    }

    /* ── Glassmorphism pill ── */
    .pill {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(12,7,26,0.75) 0%, rgba(18,10,40,0.72) 100%);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(160,120,255,0.18);
      box-shadow: 0 6px 32px rgba(0,0,0,0.55), 0 0 60px rgba(100,60,200,0.07),
                  inset 0 1px 0 rgba(200,160,255,0.1);
      height: 56px;
    }
    .vsep {
      width: 1px; height: 22px;
      background: rgba(160,120,255,0.12);
    }

    /* ── App buttons ── */
    .app-btn {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: transparent; cursor: pointer;
      border-radius: 10px; color: rgba(200,180,255,0.5);
      transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
      flex-shrink: 0;
    }
    .app-btn svg { width: 17px; height: 17px; }
    .app-btn:hover {
      color: rgba(250,240,255,0.95);
      background: rgba(140,100,255,0.18);
      transform: translateY(-4px) scale(1.15);
      box-shadow: 0 8px 20px rgba(100,60,255,0.3);
    }
    .app-btn:active { transform: translateY(-2px) scale(1.05); }

    /* ── Clock ── */
    .pill-clock { padding: 8px 18px; }
    .time-row { display: flex; align-items: baseline; gap: 3px; }
    .time-h, .time-m {
      font-size: 1.45rem; font-weight: 300; letter-spacing: -1px;
      color: rgba(235,225,255,0.92); font-family: "Outfit", sans-serif;
    }
    .time-sep {
      font-size: 1.3rem; color: rgba(168,130,255,0.5); font-weight: 200;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .time-s {
      font-size: 0.7rem; color: rgba(168,130,255,0.6);
      font-family: "JetBrains Mono", monospace; font-weight: 300;
      margin-left: 2px; align-self: flex-end; margin-bottom: 3px;
    }
    .time-date {
      font-size: 0.62rem; color: rgba(168,130,255,0.45);
      letter-spacing: 0.5px; font-weight: 300; margin-top: 1px;
      font-family: "JetBrains Mono", monospace;
    }
    .clock-line {
      width: 1px; height: 28px;
      background: linear-gradient(to bottom, transparent, rgba(168,130,255,0.25), transparent);
      margin-left: 4px;
    }

    /* ── Live dot ── */
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #00d4a0;
      box-shadow: 0 0 8px #00d4a0, 0 0 3px #00d4a0;
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 6px #00d4a0; }
      50%      { box-shadow: 0 0 14px #00d4a0, 0 0 24px #00d4a080; }
    }
    .sys-val { font-size: 0.72rem; color: rgba(200,180,255,0.65); font-weight: 300; }

    /* ── Search button ── */
    .search-toggle {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: transparent; cursor: pointer;
      border-radius: 8px; color: rgba(200,180,255,0.45);
      transition: all 0.2s ease; flex-shrink: 0;
    }
    .search-toggle svg { width: 14px; height: 14px; }
    .search-toggle:hover { color: rgba(255,255,255,0.9); background: rgba(140,100,255,0.15); }
    .search-toggle.active { color: rgba(168,130,255,1); background: rgba(140,100,255,0.2); }

    /* Wi-Fi icon */
    .wifi-icon { width: 16px; height: 16px; color: rgba(200,180,255,0.4); flex-shrink: 0; }

    /* ── Search bar (inside search-area) ── */
    .search-wrap { width: 500px; max-width: 92%; }

    .search-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 18px; border-radius: 18px;
      background: linear-gradient(135deg, rgba(14,9,30,0.88), rgba(20,12,44,0.84));
      backdrop-filter: blur(60px) saturate(200%);
      -webkit-backdrop-filter: blur(60px) saturate(200%);
      border: 1px solid rgba(168,130,255,0.25);
      box-shadow: 0 8px 48px rgba(0,0,0,0.6), inset 0 1px 0 rgba(200,160,255,0.14);
    }
    .search-icon { width: 15px; height: 15px; color: rgba(168,130,255,0.6); flex-shrink: 0; }
    .search-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: "Outfit", sans-serif; font-size: 14px; font-weight: 300;
      color: rgba(255,255,255,0.92); letter-spacing: 0.3px;
      caret-color: rgba(168,130,255,0.9);
    }
    .search-input::placeholder { color: rgba(255,255,255,0.22); }
    .search-hint {
      font-family: "JetBrains Mono", monospace; font-size: 10px;
      color: rgba(168,130,255,0.32); white-space: nowrap; flex-shrink: 0;
    }

    .search-results {
      margin-top: 6px; display: none; flex-direction: column; gap: 2px;
      padding: 8px; border-radius: 14px;
      background: rgba(8,5,20,0.92);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(140,100,255,0.14);
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      max-height: 160px; overflow-y: auto;
    }
    .search-results.has-results { display: flex; }
    .search-result-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 10px; cursor: pointer;
      transition: background 0.15s ease;
    }
    .search-result-item:hover, .search-result-item.active {
      background: rgba(140,100,255,0.12);
    }
    .search-result-icon {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px; background: rgba(140,100,255,0.12);
      color: rgba(200,180,255,0.8); flex-shrink: 0;
    }
    .search-result-icon svg { width: 14px; height: 14px; }
    .search-result-label {
      font-size: 0.85rem; color: rgba(240,235,255,0.88); font-weight: 400;
    }
    .search-result-hint {
      font-size: 0.7rem; color: rgba(168,130,255,0.4);
      font-family: "JetBrains Mono", monospace; margin-left: auto;
    }

    /* ── Mini Visualizer ── */
    .viz-pill {
      display: flex; align-items: center;
      padding: 8px 12px; gap: 8px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(12,7,26,0.75), rgba(18,10,40,0.72));
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(160,120,255,0.18);
      box-shadow: 0 6px 32px rgba(0,0,0,0.55), inset 0 1px 0 rgba(200,160,255,0.1);
      height: 56px;
    }
    #viz-canvas {
      width: 80px; height: 32px;
      border-radius: 6px;
    }
    .viz-toggle {
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: transparent; cursor: pointer;
      border-radius: 7px; color: rgba(200,180,255,0.45);
      transition: all 0.2s ease;
    }
    .viz-toggle svg { width: 12px; height: 12px; }
    .viz-toggle:hover { color: rgba(168,130,255,0.9); background: rgba(140,100,255,0.15); }
    .viz-toggle.active { color: rgba(168,130,255,1); }

    /* ── Music Player pill ── */
    .music-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 12px; border-radius: 20px;
      background: linear-gradient(135deg, rgba(12,7,26,0.75), rgba(18,10,40,0.72));
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(160,120,255,0.18);
      box-shadow: 0 6px 32px rgba(0,0,0,0.55), inset 0 1px 0 rgba(200,160,255,0.1);
      height: 56px;
    }
    .music-btn {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: transparent; cursor: pointer;
      border-radius: 8px; color: rgba(200,180,255,0.5);
      transition: all 0.2s ease; flex-shrink: 0;
    }
    .music-btn svg { width: 13px; height: 13px; }
    .music-btn:hover { color: rgba(255,255,255,0.9); background: rgba(140,100,255,0.15); }
    .music-btn.active { color: rgba(168,130,255,1); }
    .music-info {
      display: flex; flex-direction: column;
      max-width: 110px; overflow: hidden;
    }
    .music-title {
      font-size: 0.72rem; color: rgba(235,225,255,0.82);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-weight: 400;
    }
    .music-artist {
      font-size: 0.62rem; color: rgba(168,130,255,0.5);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .music-progress {
      width: 60px; height: 3px;
      background: rgba(255,255,255,0.07); border-radius: 2px;
      overflow: hidden; cursor: pointer;
    }
    .music-progress-bar {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, #6c5ce7, #a29bfe);
      transition: width 0.5s linear;
    }
    .vol-slider {
      -webkit-appearance: none;
      width: 48px; height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.1);
      outline: none; cursor: pointer;
    }
    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px; border-radius: 50%;
      background: #a29bfe; cursor: pointer;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <div class="dock-root" id="dock-root">

    <!-- Search area (top 200px) -->
    <div class="search-area" id="search-area">
      <div class="search-wrap" id="search-wrap">
        <div class="search-bar">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input class="search-input" id="search-input" type="text" placeholder="Tìm kiếm ứng dụng..." autocomplete="off" spellcheck="false" />
          <span class="search-hint">ESC đóng  ·  ↑↓ chọn  ·  Enter mở</span>
        </div>
        <div class="search-results" id="search-results"></div>
      </div>
    </div>

    <!-- Bottom dock bar (80px) -->
    <div class="dock-bottom" id="dock-bottom">

      <!-- Status -->
      <div class="pill">
        <div class="live-dot"></div>
        <span class="sys-val">Active</span>
      </div>

      <!-- Apps 1: File, Browser, Terminal, Code -->
      <div class="pill">
        <button class="app-btn" data-tip="Explorer" data-app="explorer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
        <div class="vsep"></div>
        <button class="app-btn" data-tip="Edge" data-app="browser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </button>
        <div class="vsep"></div>
        <button class="app-btn" data-tip="Terminal" data-app="terminal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4,17 10,11 4,5"/><line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
        </button>
        <div class="vsep"></div>
        <button class="app-btn" data-tip="VS Code" data-app="vscode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16,18 22,12 16,6"/><polyline points="8,6 2,12 8,18"/>
          </svg>
        </button>
      </div>

      <!-- Clock -->
      <div class="pill pill-clock">
        <div>
          <div class="time-row">
            <span class="time-h" id="t-h">00</span>
            <span class="time-sep">:</span>
            <span class="time-m" id="t-m">00</span>
            <span class="time-s" id="t-s">00</span>
          </div>
          <div class="time-date" id="t-date">---</div>
        </div>
        <div class="clock-line"></div>
      </div>

      <!-- Apps 2: Settings, Notepad, Calc, Store -->
      <div class="pill">
        <button class="app-btn" data-tip="Settings" data-app="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <div class="vsep"></div>
        <button class="app-btn" data-tip="Notepad" data-app="notepad">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </button>
        <div class="vsep"></div>
        <button class="app-btn" data-tip="Calculator" data-app="calculator">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="2" width="16" height="20" rx="2"/>
            <line x1="8" y1="6" x2="16" y2="6"/>
            <line x1="8" y1="10" x2="8.01" y2="10"/><line x1="12" y1="10" x2="12.01" y2="10"/>
            <line x1="16" y1="10" x2="16.01" y2="10"/><line x1="8" y1="14" x2="8.01" y2="14"/>
            <line x1="12" y1="14" x2="12.01" y2="14"/><line x1="16" y1="14" x2="12" y2="18"/>
          </svg>
        </button>
        <div class="vsep"></div>
        <button class="app-btn" data-tip="Store" data-app="store">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 7v13a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-3-5z"/>
            <line x1="3" y1="7" x2="21" y2="7"/><path d="M16 11a4 4 0 0 1-8 0"/>
          </svg>
        </button>
      </div>

      <!-- Mini Visualizer pill -->
      <div class="viz-pill">
        <canvas id="viz-canvas" width="80" height="32"></canvas>
        <button class="viz-toggle" id="viz-btn" title="Toggle microphone visualizer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
      </div>

      <!-- Music Player pill -->
      <div class="music-pill">
        <button class="music-btn" id="open-music-btn" title="Open audio file">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
          </svg>
        </button>
        <div class="music-info">
          <div class="music-title" id="music-title">No track</div>
          <div class="music-artist" id="music-artist">Click 🎵 to open</div>
        </div>
        <div class="vsep"></div>
        <button class="music-btn" id="music-prev" title="Previous">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="19,20 9,12 19,4"/><line x1="5" y1="19" x2="5" y2="5"/>
          </svg>
        </button>
        <button class="music-btn" id="music-play" title="Play/Pause">
          <svg id="play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
        </button>
        <button class="music-btn" id="music-next" title="Next">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5,4 15,12 5,20"/><line x1="19" y1="5" x2="19" y2="19"/>
          </svg>
        </button>
        <div class="vsep"></div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:center">
          <div class="music-progress" id="music-progress">
            <div class="music-progress-bar" id="music-bar" style="width:0%"></div>
          </div>
          <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="70" title="Volume">
        </div>
      </div>

      <!-- Search + time pill -->
      <div class="pill">
        <button class="search-toggle" id="search-btn" title="Search (Ctrl+Space)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <div class="vsep"></div>
        <svg class="wifi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12.55a11 11 0 0 1 14 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <circle cx="12" cy="20" r="1" fill="currentColor"/>
        </svg>
        <span class="sys-val" id="mini-time">--:--</span>
      </div>

    </div><!-- /dock-bottom -->
  </div><!-- /dock-root -->

  <audio id="audio" style="display:none"></audio>

  <script>
    // ── Click-through: notify main process when mouse is over interactive elements ──
    var isInteractive = false;
    document.addEventListener('mousemove', function(e) {
      var el = document.elementFromPoint(e.clientX, e.clientY);
      var over = false;
      if (el && el !== document.body && el !== document.documentElement) {
        var style = window.getComputedStyle(el);
        if (style.pointerEvents !== 'none') over = true;
      }
      if (over !== isInteractive) {
        isInteractive = over;
        if (window.api && window.api.setDockMouseEvents) {
          window.api.setDockMouseEvents(over);
        }
      }
    });
    document.addEventListener('mouseleave', function() {
      if (isInteractive) {
        isInteractive = false;
        if (window.api && window.api.setDockMouseEvents) {
          window.api.setDockMouseEvents(false);
        }
      }
    });

    // ── Clock ──
    var DAYS = ['CN','T2','T3','T4','T5','T6','T7'];
    function pad(n) { return String(n).padStart(2,'0'); }
    function tick() {
      var n = new Date();
      document.getElementById('t-h').textContent = pad(n.getHours());
      document.getElementById('t-m').textContent = pad(n.getMinutes());
      document.getElementById('t-s').textContent = pad(n.getSeconds());
      document.getElementById('mini-time').textContent = pad(n.getHours())+':'+pad(n.getMinutes());
      document.getElementById('t-date').textContent =
        DAYS[n.getDay()] + '  ·  ' + pad(n.getDate()) + '/' + pad(n.getMonth()+1) + '/' + n.getFullYear();
    }
    tick(); setInterval(tick, 1000);

    // ── App definitions ──
    var APPS = [
      { id:'explorer',    label:'File Explorer',    icon:'folder',   hint:'Win+E',   key:['file','explorer','thu muc'] },
      { id:'browser',     label:'Edge Browser',     icon:'globe',    hint:'',        key:['browser','edge','web','internet'] },
      { id:'terminal',    label:'Terminal',          icon:'terminal', hint:'',        key:['terminal','cmd','wt','console'] },
      { id:'vscode',      label:'VS Code',           icon:'code',     hint:'',        key:['vscode','code','editor'] },
      { id:'settings',    label:'Windows Settings',  icon:'settings', hint:'Win+I',   key:['settings','cai dat'] },
      { id:'notepad',     label:'Notepad',           icon:'file',     hint:'',        key:['notepad','ghi chu','text'] },
      { id:'calculator',  label:'Calculator',        icon:'calc',     hint:'',        key:['calc','may tinh','calculator'] },
      { id:'store',       label:'Microsoft Store',   icon:'store',    hint:'',        key:['store','cua hang','app'] },
      { id:'paint',       label:'Paint',             icon:'paint',    hint:'',        key:['paint','ve','hinh'] },
      { id:'taskmanager', label:'Task Manager',      icon:'cpu',      hint:'Ctrl+Shift+Esc', key:['task manager','tac vu','cpu','process'] }
    ];

    var SVG = {
      folder:  '<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>',
      globe:   '<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>',
      terminal:'<polyline points="4,17 10,11 4,5"/><line x1="12" y1="19" x2="20" y2="19"/>',
      code:    '<polyline points="16,18 22,12 16,6"/><polyline points="8,6 2,12 8,18"/>',
      settings:'<circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/>',
      file:    '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/>',
      calc:    '<rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/>',
      store:   '<path d="M6 2L3 7v13a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-3-5z"/><line x1="3" y1="7" x2="21" y2="7"/>',
      paint:   '<circle cx="13" cy="7" r="2"/><circle cx="7" cy="10" r="2"/><circle cx="17" cy="13" r="2"/><circle cx="7" cy="17" r="2"/>',
      cpu:     '<rect x="2" y="2" width="20" height="20" rx="2"/><rect x="6" y="6" width="12" height="12"/>'
    };

    function launchApp(id) {
      if (window.api && window.api.launchApp) window.api.launchApp(id);
    }

    document.querySelectorAll('.app-btn[data-app]').forEach(function(btn) {
      btn.addEventListener('click', function() { launchApp(this.getAttribute('data-app')); });
    });

    // ── Search ──
    var searchArea   = document.getElementById('search-area');
    var searchInput  = document.getElementById('search-input');
    var searchResults= document.getElementById('search-results');
    var searchBtn    = document.getElementById('search-btn');
    var activeIdx    = -1;

    function openSearch() {
      searchArea.classList.add('open');
      searchWrap.style.animation = 'slideUp 0.3s cubic-bezier(0.16,1,0.3,1) both';
      searchBtn.classList.add('active');
      searchInput.focus();
    }
    function closeSearch() {
      searchArea.classList.remove('open');
      searchBtn.classList.remove('active');
      searchInput.value = '';
      renderResults([]);
      activeIdx = -1;
    }

    var searchWrap = document.getElementById('search-wrap');
    searchBtn.addEventListener('click', toggleSearch);
    function toggleSearch() {
      if (searchArea.classList.contains('open')) closeSearch(); else openSearch();
    }

    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.code === 'Space') { e.preventDefault(); toggleSearch(); return; }
      if (e.code === 'Escape') { closeSearch(); return; }
      if (!searchArea.classList.contains('open')) return;
      var items = searchResults.querySelectorAll('.search-result-item');
      if (e.code === 'ArrowDown') {
        e.preventDefault();
        activeIdx = (activeIdx + 1) % items.length;
        items.forEach(function(it,i){ it.classList.toggle('active', i===activeIdx); });
      } else if (e.code === 'ArrowUp') {
        e.preventDefault();
        activeIdx = (activeIdx - 1 + items.length) % items.length;
        items.forEach(function(it,i){ it.classList.toggle('active', i===activeIdx); });
      } else if (e.code === 'Enter') {
        var a = searchResults.querySelector('.active');
        if (a) { launchApp(a.getAttribute('data-app')); closeSearch(); }
      }
    });

    searchInput.addEventListener('input', function() {
      var q = this.value.toLowerCase().trim();
      if (!q) { renderResults([]); return; }
      var found = APPS.filter(function(a) {
        return a.label.toLowerCase().includes(q) || a.key.some(function(k){ return k.includes(q); });
      });
      renderResults(found);
      activeIdx = found.length > 0 ? 0 : -1;
    });

    function renderResults(apps) {
      searchResults.innerHTML = '';
      if (!apps.length) { searchResults.classList.remove('has-results'); return; }
      searchResults.classList.add('has-results');
      apps.forEach(function(app, i) {
        var item = document.createElement('div');
        item.className = 'search-result-item' + (i === activeIdx ? ' active' : '');
        item.setAttribute('data-app', app.id);
        item.innerHTML =
          '<div class="search-result-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
          (SVG[app.icon] || SVG.file) + '</svg></div>' +
          '<span class="search-result-label">' + app.label + '</span>' +
          (app.hint ? '<span class="search-result-hint">' + app.hint + '</span>' : '');
        item.addEventListener('click', function() { launchApp(app.id); closeSearch(); });
        searchResults.appendChild(item);
      });
    }

    // ── Mini Visualizer on dock ──
    var vizCanvas = document.getElementById('viz-canvas');
    var vizCtx    = vizCanvas.getContext('2d');
    var vizBtn    = document.getElementById('viz-btn');
    var vizActive = false;
    var vizStream, vizAudioCtx, vizAnalyser, vizAnimFrame;
    var vizBars   = new Array(20).fill(0);

    function drawVizIdle() {
      vizCtx.clearRect(0, 0, 80, 32);
      var now = Date.now() * 0.002;
      for (var i = 0; i < 20; i++) {
        var h = (Math.sin(now + i * 0.4) * 0.3 + 0.35) * 28;
        var grad = vizCtx.createLinearGradient(0, 32, 0, 32 - h);
        grad.addColorStop(0, 'rgba(108,92,231,0.3)');
        grad.addColorStop(1, 'rgba(162,155,254,0.5)');
        vizCtx.fillStyle = grad;
        vizCtx.fillRect(i * 4, 32 - h, 3, h);
      }
    }

    function drawVizLive() {
      vizAnimFrame = requestAnimationFrame(drawVizLive);
      var dataArr = new Uint8Array(vizAnalyser.frequencyBinCount);
      vizAnalyser.getByteFrequencyData(dataArr);
      vizCtx.clearRect(0, 0, 80, 32);
      for (var i = 0; i < 20; i++) {
        var idx = Math.floor((i / 20) * dataArr.length * 0.6);
        var v = (dataArr[idx] / 255) * 28;
        vizBars[i] = vizBars[i] * 0.75 + v * 0.25;
        var grad = vizCtx.createLinearGradient(0, 32, 0, 32 - vizBars[i]);
        grad.addColorStop(0, '#6c5ce7');
        grad.addColorStop(1, '#a29bfe');
        vizCtx.fillStyle = grad;
        vizCtx.shadowBlur = 4;
        vizCtx.shadowColor = '#a29bfe66';
        vizCtx.fillRect(i * 4, 32 - vizBars[i], 3, vizBars[i]);
        vizCtx.shadowBlur = 0;
      }
    }

    // Idle animation always running
    (function idleLoop() {
      if (!vizActive) { drawVizIdle(); requestAnimationFrame(idleLoop); }
    })();

    vizBtn.addEventListener('click', function() {
      if (vizActive) {
        // Stop
        cancelAnimationFrame(vizAnimFrame);
        if (vizStream) vizStream.getTracks().forEach(function(t){ t.stop(); });
        if (vizAudioCtx) vizAudioCtx.close();
        vizActive = false;
        vizBtn.classList.remove('active');
      } else {
        // Start microphone
        navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
          vizStream = stream;
          vizAudioCtx = new AudioContext();
          var src = vizAudioCtx.createMediaStreamSource(stream);
          vizAnalyser = vizAudioCtx.createAnalyser();
          vizAnalyser.fftSize = 128;
          vizAnalyser.smoothingTimeConstant = 0.8;
          src.connect(vizAnalyser);
          vizActive = true;
          vizBtn.classList.add('active');
          drawVizLive();
        }).catch(function(e) { console.error('Mic denied', e); });
      }
    });

    // ── Music Player ──
    var audio      = document.getElementById('audio');
    var playlist   = [];
    var currentIdx = 0;
    var isPlaying  = false;

    function updatePlayIcon() {
      var icon = document.getElementById('play-icon');
      if (isPlaying) {
        icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
      } else {
        icon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
      }
    }

    function loadTrack(idx) {
      if (!playlist.length) return;
      currentIdx = (idx + playlist.length) % playlist.length;
      var track = playlist[currentIdx];
      audio.src = track.url;
      document.getElementById('music-title').textContent = track.name;
      document.getElementById('music-artist').textContent = track.ext.toUpperCase() + ' · ' + formatTime(0);
      if (isPlaying) audio.play();
    }

    function formatTime(s) {
      var m = Math.floor(s / 60);
      return m + ':' + String(Math.floor(s % 60)).padStart(2,'0');
    }

    audio.addEventListener('timeupdate', function() {
      if (audio.duration) {
        var pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById('music-bar').style.width = pct + '%';
        document.getElementById('music-artist').textContent =
          formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
      }
    });
    audio.addEventListener('ended', function() { loadTrack(currentIdx + 1); });

    document.getElementById('vol-slider').addEventListener('input', function() {
      audio.volume = this.value / 100;
    });
    audio.volume = 0.7;

    document.getElementById('music-progress').addEventListener('click', function(e) {
      if (!audio.duration) return;
      var rect = this.getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    });

    document.getElementById('music-play').addEventListener('click', function() {
      if (!playlist.length) return;
      if (isPlaying) { audio.pause(); isPlaying = false; }
      else { audio.play(); isPlaying = true; }
      updatePlayIcon();
    });
    document.getElementById('music-prev').addEventListener('click', function() { loadTrack(currentIdx - 1); });
    document.getElementById('music-next').addEventListener('click', function() { loadTrack(currentIdx + 1); });

    document.getElementById('open-music-btn').addEventListener('click', async function() {
      if (!window.api || !window.api.dockOpenAudio) return;
      var filePath = await window.api.dockOpenAudio();
      if (!filePath) return;
      var name = filePath.split(/[\\/]/).pop();
      var ext  = name.split('.').pop() || 'mp3';
      var baseName = name.replace(/\.[^.]+$/, '');
      playlist = [{ url: 'file://' + filePath, name: baseName, ext: ext }];
      currentIdx = 0;
      isPlaying = true;
      loadTrack(0);
      audio.play();
      updatePlayIcon();
    });
  </script>
</body>
</html>
