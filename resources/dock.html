<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ambient Widget</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600&family=JetBrains+Mono:wght@200;300;400&display=swap");

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: "Outfit", sans-serif;
      user-select: none;
      cursor: default;
    }

    .widget-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
    }

    /* === Main floating bar === */
    .bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 0;
      border-radius: 22px;
      position: relative;
      animation: barReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes barReveal {
      from { opacity: 0; transform: translateY(20px) scale(0.95); filter: blur(8px); }
      to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    /* === Glass pill container === */
    .pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      background: rgba(8, 6, 18, 0.5);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border: 1px solid rgba(168, 130, 255, 0.08);
      border-radius: 18px;
      position: relative;
      overflow: hidden;
    }

    .pill::before {
      content: "";
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(168,130,255,0.25), transparent);
    }

    /* Individual pills spacing */
    .pill + .pill {
      margin-left: 8px;
    }

    /* === Clock pill (center hero) === */
    .clock-pill {
      padding: 8px 28px;
      background: rgba(8, 6, 18, 0.55);
      border: 1px solid rgba(168, 130, 255, 0.1);
      box-shadow:
        0 8px 40px rgba(0, 0, 0, 0.4),
        0 0 60px rgba(108, 92, 231, 0.06);
    }

    .clock-pill::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 25%;
      right: 25%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(168,130,255,0.2), transparent);
    }

    .time-display {
      display: flex;
      align-items: baseline;
      gap: 2px;
    }

    .time-hours,
    .time-minutes {
      font-family: "Outfit", sans-serif;
      font-size: 30px;
      font-weight: 200;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 2px;
      line-height: 1;
      text-shadow: 0 0 30px rgba(168, 130, 255, 0.15);
    }

    .time-separator {
      font-size: 26px;
      font-weight: 100;
      color: rgba(168, 130, 255, 0.6);
      animation: blink 2s ease-in-out infinite;
      margin: 0 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .time-seconds {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      font-weight: 300;
      color: rgba(168, 130, 255, 0.45);
      margin-left: 6px;
      letter-spacing: 1px;
      min-width: 18px;
    }

    .date-line {
      text-align: center;
      font-size: 10px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.28);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* === Status pills (left & right) === */
    .status-icon {
      width: 16px;
      height: 16px;
      color: rgba(168, 130, 255, 0.5);
      flex-shrink: 0;
    }

    .status-text {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .status-value {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.5px;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #00cec9;
      box-shadow: 0 0 8px rgba(0, 206, 201, 0.5);
      animation: dotBreathe 3s ease-in-out infinite;
    }

    @keyframes dotBreathe {
      0%, 100% { box-shadow: 0 0 6px rgba(0, 206, 201, 0.3); transform: scale(1); }
      50% { box-shadow: 0 0 12px rgba(0, 206, 201, 0.6); transform: scale(1.2); }
    }

    /* === App icon pills === */
    .app-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      color: rgba(255, 255, 255, 0.4);
      background: transparent;
      border: none;
      outline: none;
      position: relative;
    }

    .app-btn svg {
      width: 16px;
      height: 16px;
      transition: inherit;
    }

    .app-btn:hover {
      color: white;
      background: rgba(168, 130, 255, 0.15);
      transform: translateY(-6px) scale(1.2);
      box-shadow: 0 0 20px rgba(108, 92, 231, 0.25);
    }

    .app-btn:active {
      transform: translateY(-3px) scale(1.1);
    }

    /* Tooltip */
    .app-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) scale(0.85);
      padding: 4px 10px;
      background: rgba(10, 8, 20, 0.9);
      color: rgba(255, 255, 255, 0.85);
      font-size: 10px;
      font-weight: 500;
      border-radius: 8px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      border: 1px solid rgba(168, 130, 255, 0.1);
    }

    .app-btn:hover::after {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    /* Tiny separator */
    .vsep {
      width: 1px;
      height: 16px;
      background: linear-gradient(180deg, transparent, rgba(168,130,255,0.1), transparent);
      margin: 0 2px;
    }

    /* === Ambient animated line underneath === */
    .ambient-line {
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 2px;
      border-radius: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(108, 92, 231, 0.4),
        rgba(168, 130, 255, 0.6),
        rgba(108, 92, 231, 0.4),
        transparent
      );
      animation: ambientShift 4s ease-in-out infinite;
    }

    @keyframes ambientShift {
      0%, 100% { width: 100px; opacity: 0.5; }
      50% { width: 180px; opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="widget-wrap">
    <div class="bar">

      <!-- LEFT: Status pill -->
      <div class="pill">
        <div class="status-dot"></div>
        <span class="status-value" id="cpu-val">Active</span>
      </div>

      <!-- LEFT-CENTER: Quick apps -->
      <div class="pill">
        <button class="app-btn" data-tooltip="Explorer" data-app="explorer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
        <div class="vsep"></div>
        <button class="app-btn" data-tooltip="Browser" data-app="browser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </button>
        <div class="vsep"></div>
        <button class="app-btn" data-tooltip="Terminal" data-app="terminal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4,17 10,11 4,5"/>
            <line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
        </button>
      </div>

      <!-- CENTER: Clock (hero) -->
      <div class="pill clock-pill">
        <div>
          <div class="time-display">
            <span class="time-hours" id="t-h">00</span>
            <span class="time-separator">:</span>
            <span class="time-minutes" id="t-m">00</span>
            <span class="time-seconds" id="t-s">00</span>
          </div>
          <div class="date-line" id="t-date">---</div>
        </div>
        <div class="ambient-line"></div>
      </div>

      <!-- RIGHT-CENTER: More apps -->
      <div class="pill">
        <button class="app-btn" data-tooltip="Settings" data-app="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <div class="vsep"></div>
        <button class="app-btn" data-tooltip="Notepad" data-app="notepad">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </button>
        <div class="vsep"></div>
        <button class="app-btn" data-tooltip="Store" data-app="store">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 7v13a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-3-5z"/>
            <line x1="3" y1="7" x2="21" y2="7"/>
            <path d="M16 11a4 4 0 0 1-8 0"/>
          </svg>
        </button>
      </div>

      <!-- RIGHT: System info pill -->
      <div class="pill">
        <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12.55a11 11 0 0 1 14 0"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <circle cx="12" cy="20" r="1" fill="currentColor"/>
        </svg>
        <div class="vsep"></div>
        <span class="status-value" id="tray-time">--:--</span>
      </div>

    </div>
  </div>

  <script>
    // === Clock ===
    function tick() {
      var now = new Date();
      document.getElementById('t-h').textContent = now.getHours().toString().padStart(2, '0');
      document.getElementById('t-m').textContent = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('t-s').textContent = now.getSeconds().toString().padStart(2, '0');

      var days = ['Chủ Nhật','Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy'];
      var d = now.getDate();
      var m = now.getMonth() + 1;
      document.getElementById('t-date').textContent =
        days[now.getDay()] + '  ·  ' + d.toString().padStart(2,'0') + '/' + m.toString().padStart(2,'0') + '/' + now.getFullYear();

      // tray mini clock
      document.getElementById('tray-time').textContent =
        now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    }
    tick();
    setInterval(tick, 1000);

    // === App Launcher ===
    document.querySelectorAll('.app-btn[data-app]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var app = this.getAttribute('data-app');
        if (window.api && window.api.launchApp) {
          window.api.launchApp(app);
        }
      });
    });

    // === Proximity magnification ===
    var btns = document.querySelectorAll('.app-btn');
    document.addEventListener('mousemove', function(e) {
      btns.forEach(function(btn) {
        var rect = btn.getBoundingClientRect();
        var cx = rect.left + rect.width / 2;
        var cy = rect.top + rect.height / 2;
        var dx = e.clientX - cx;
        var dy = e.clientY - cy;
        var dist = Math.sqrt(dx*dx + dy*dy);
        var maxDist = 120;
        var f = Math.max(0, 1 - dist / maxDist);
        f = f * f * (3 - 2 * f); // smoothstep
        var s = 1 + f * 0.25;
        var lift = f * 6;
        btn.style.transform = 'translateY(-' + lift + 'px) scale(' + s + ')';
        btn.style.color = 'rgba(255,255,255,' + (0.4 + f * 0.6) + ')';
      });
    });
  </script>
</body>
</html>
