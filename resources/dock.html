<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Desktop Dock</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: "Inter", "Segoe UI", sans-serif;
      user-select: none;
      cursor: default;
    }

    .dock-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
    }

    .dock {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: rgba(15, 15, 25, 0.65);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
        0 1px 0 rgba(255, 255, 255, 0.06) inset;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .dock:hover {
      background: rgba(15, 15, 25, 0.75);
      border-color: rgba(108, 92, 231, 0.15);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.5),
        0 0 40px rgba(108, 92, 231, 0.08);
    }

    /* Dock Items */
    .dock-item {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      color: rgba(255, 255, 255, 0.7);
      background: transparent;
      border: none;
      outline: none;
    }

    .dock-item:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      transform: translateY(-4px) scale(1.1);
    }

    .dock-item:active {
      transform: translateY(-2px) scale(1.05);
    }

    /* Tooltip */
    .dock-item::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) scale(0.8);
      padding: 4px 10px;
      background: rgba(15, 15, 25, 0.85);
      backdrop-filter: blur(12px);
      color: white;
      font-size: 11px;
      font-weight: 500;
      border-radius: 8px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .dock-item:hover::after {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    /* Running indicator */
    .dock-item--running::before {
      content: "";
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #6c5ce7;
      box-shadow: 0 0 6px #6c5ce7;
    }

    /* SVG icons */
    .dock-item svg {
      width: 22px;
      height: 22px;
    }

    /* Divider */
    .dock-divider {
      width: 1px;
      height: 28px;
      background: rgba(255, 255, 255, 0.08);
      margin: 0 4px;
    }

    /* Clock */
    .dock-clock {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px 14px;
      cursor: default;
      min-width: 70px;
    }

    .dock-clock__time {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: 0.5px;
      line-height: 1;
    }

    .dock-clock__date {
      font-size: 9px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.3px;
      margin-top: 3px;
      line-height: 1;
    }

    /* Weather placeholder */
    .dock-weather {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      cursor: default;
    }

    .dock-weather__icon {
      font-size: 16px;
    }

    .dock-weather__temp {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.7);
    }

    /* System tray */
    .dock-tray {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .dock-tray-item {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      color: rgba(255, 255, 255, 0.5);
      background: transparent;
      border: none;
      outline: none;
    }

    .dock-tray-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
    }

    .dock-tray-item svg {
      width: 14px;
      height: 14px;
    }

    /* Animate dock entrance */
    .dock {
      animation: dockSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes dockSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="dock-container">
    <div class="dock" id="dock">
      <!-- App shortcuts -->
      <button class="dock-item" data-tooltip="File Explorer" data-app="explorer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
      </button>

      <button class="dock-item" data-tooltip="Browser" data-app="browser">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </button>

      <button class="dock-item" data-tooltip="Terminal" data-app="terminal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4,17 10,11 4,5"/>
          <line x1="12" y1="19" x2="20" y2="19"/>
        </svg>
      </button>

      <button class="dock-item" data-tooltip="Settings" data-app="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>

      <div class="dock-divider"></div>

      <!-- System tray -->
      <div class="dock-tray">
        <button class="dock-tray-item" data-tooltip="WiFi" id="wifi-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12.55a11 11 0 0 1 14 0"/>
            <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
            <circle cx="12" cy="20" r="1" fill="currentColor"/>
          </svg>
        </button>

        <button class="dock-tray-item" data-tooltip="Volume" id="vol-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor" stroke="none" opacity="0.7"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>

        <button class="dock-tray-item" data-tooltip="Battery" id="battery-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="6" width="18" height="12" rx="2"/>
            <rect x="3" y="8" width="12" height="8" rx="1" fill="currentColor" opacity="0.3"/>
            <line x1="23" y1="10" x2="23" y2="14"/>
          </svg>
        </button>
      </div>

      <div class="dock-divider"></div>

      <!-- Clock -->
      <div class="dock-clock" id="clock">
        <div class="dock-clock__time" id="clock-time">--:--</div>
        <div class="dock-clock__date" id="clock-date">---</div>
      </div>
    </div>
  </div>

  <script>
    // === Clock ===
    function updateClock() {
      var now = new Date();
      var h = now.getHours().toString().padStart(2, '0');
      var m = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('clock-time').textContent = h + ':' + m;

      var days = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];
      var day = days[now.getDay()];
      var dd = now.getDate().toString().padStart(2, '0');
      var mm = (now.getMonth() + 1).toString().padStart(2, '0');
      document.getElementById('clock-date').textContent = day + ', ' + dd + '/' + mm;
    }

    updateClock();
    setInterval(updateClock, 1000);

    // === App launcher ===
    document.querySelectorAll('.dock-item[data-app]').forEach(function(item) {
      item.addEventListener('click', function() {
        var app = this.getAttribute('data-app');
        if (window.api && window.api.launchApp) {
          window.api.launchApp(app);
        }
      });
    });

    // === Hover animation (macOS-like magnification) ===
    var items = document.querySelectorAll('.dock-item');

    document.getElementById('dock').addEventListener('mousemove', function(e) {
      items.forEach(function(item) {
        var rect = item.getBoundingClientRect();
        var cx = rect.left + rect.width / 2;
        var dist = Math.abs(e.clientX - cx);
        var maxDist = 120;
        var scale = 1 + Math.max(0, 1 - dist / maxDist) * 0.25;
        var lift = Math.max(0, 1 - dist / maxDist) * 6;
        item.style.transform = 'translateY(-' + lift + 'px) scale(' + scale + ')';
      });
    });

    document.getElementById('dock').addEventListener('mouseleave', function() {
      items.forEach(function(item) {
        item.style.transform = '';
      });
    });
  </script>
</body>
</html>
