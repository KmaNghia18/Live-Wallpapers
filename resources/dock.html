<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Dock</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500&family=JetBrains+Mono:wght@200;300;400&display=swap");
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:transparent;overflow:hidden;
      font-family:"Outfit",sans-serif;user-select:none;-webkit-app-region:no-drag}

    /* Window 280px: top 200px = overlays, bottom 80px = dock */
    .dock-root{position:fixed;inset:0;display:flex;flex-direction:column;
      align-items:center;pointer-events:none;z-index:1}

    /* ─── Overlay area (top 200px) ─── */
    .overlay-area{width:100%;flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:flex-end;padding-bottom:8px;pointer-events:none}
    .overlay-area.active{pointer-events:auto}

    /* ─── Dock bar (bottom 80px) ─── */
    .dock-bottom{width:100%;height:80px;display:flex;align-items:center;
      justify-content:center;padding:0 8px;gap:7px;flex-shrink:0}

    /* ─── Glassmorphism pill ─── */
    .pill{display:flex;align-items:center;gap:6px;padding:8px 13px;
      border-radius:20px;height:56px;
      background:linear-gradient(135deg,rgba(10,6,24,0.78),rgba(16,9,38,0.74));
      backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);
      border:1px solid rgba(150,110,255,0.18);
      box-shadow:0 6px 28px rgba(0,0,0,0.55),inset 0 1px 0 rgba(200,160,255,0.09)}
    .vsep{width:1px;height:22px;background:rgba(150,110,255,0.12);flex-shrink:0}

    /* ─── App buttons ─── */
    .app-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;
      border:none;background:transparent;cursor:pointer;border-radius:10px;
      color:rgba(190,165,255,0.48);transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);flex-shrink:0}
    .app-btn svg{width:17px;height:17px;pointer-events:none}
    .app-btn:hover{color:rgba(250,240,255,0.95);background:rgba(130,90,255,0.18);
      transform:translateY(-4px) scale(1.15);box-shadow:0 8px 20px rgba(100,60,255,0.3)}
    .app-btn:active{transform:translateY(-2px) scale(1.06)}

    /* ─── Clock ─── */
    .pill-clock{padding:8px 16px}
    .time-row{display:flex;align-items:baseline;gap:3px}
    .time-h,.time-m{font-size:1.42rem;font-weight:300;letter-spacing:-1px;color:rgba(235,220,255,0.92)}
    .time-sep{font-size:1.3rem;color:rgba(160,120,255,0.5);font-weight:200;animation:blink 1s step-end infinite}
    @keyframes blink{50%{opacity:0}}
    .time-s{font-size:0.68rem;color:rgba(160,120,255,0.6);font-family:"JetBrains Mono",monospace;
      font-weight:300;margin-left:2px;align-self:flex-end;margin-bottom:3px}
    .time-date{font-size:0.6rem;color:rgba(160,120,255,0.42);letter-spacing:0.4px;
      font-weight:300;margin-top:1px;font-family:"JetBrains Mono",monospace}
    .clock-sep{width:1px;height:28px;background:linear-gradient(to bottom,transparent,rgba(160,120,255,0.22),transparent);margin-left:4px}

    /* ─── Live dot ─── */
    .live-dot{width:7px;height:7px;border-radius:50%;background:#00d4a0;flex-shrink:0;
      box-shadow:0 0 8px #00d4a0;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 6px #00d4a0}50%{box-shadow:0 0 14px #00d4a0,0 0 22px #00d4a070}}
    .sys-val{font-size:0.7rem;color:rgba(190,165,255,0.6);font-weight:300}

    /* ─── Icon buttons ─── */
    .icon-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;
      border:none;background:transparent;cursor:pointer;border-radius:8px;
      color:rgba(190,165,255,0.42);transition:all 0.18s ease;flex-shrink:0}
    .icon-btn svg{width:13px;height:13px;pointer-events:none}
    .icon-btn:hover{color:rgba(255,255,255,0.88);background:rgba(130,90,255,0.14)}
    .icon-btn.on{color:rgba(162,155,254,1)}
    .wifi-icon{width:15px;height:15px;color:rgba(190,165,255,0.38);flex-shrink:0}

    /* ─── Mini Visualizer ─── */
    .viz-pill{display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:20px;height:56px;
      background:linear-gradient(135deg,rgba(10,6,24,0.78),rgba(16,9,38,0.74));
      backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
      border:1px solid rgba(150,110,255,0.18);box-shadow:0 6px 28px rgba(0,0,0,0.55),inset 0 1px 0 rgba(200,160,255,0.09)}
    #viz-canvas{width:76px;height:30px;border-radius:5px;display:block}

    /* ─── Music Player ─── */
    .music-pill{display:flex;align-items:center;gap:6px;padding:8px 11px;border-radius:20px;height:56px;
      background:linear-gradient(135deg,rgba(10,6,24,0.78),rgba(16,9,38,0.74));
      backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
      border:1px solid rgba(150,110,255,0.18);box-shadow:0 6px 28px rgba(0,0,0,0.55),inset 0 1px 0 rgba(200,160,255,0.09)}
    .music-info{display:flex;flex-direction:column;max-width:100px;overflow:hidden}
    .music-title{font-size:0.7rem;color:rgba(230,220,255,0.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400}
    .music-sub{font-size:0.58rem;color:rgba(160,120,255,0.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:"JetBrains Mono",monospace}
    .music-prog-wrap{width:56px;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;cursor:pointer;flex-shrink:0}
    .music-prog-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,#6c5ce7,#a29bfe);transition:width 0.4s linear}
    .vol-slider{-webkit-appearance:none;appearance:none;width:44px;height:3px;
      border-radius:2px;background:rgba(255,255,255,0.08);outline:none;cursor:pointer;flex-shrink:0}
    .vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:9px;height:9px;
      border-radius:50%;background:#a29bfe;cursor:pointer}

    /* ─── Search ─── */
    .search-wrap{width:480px;max-width:90%}
    .search-bar{display:flex;align-items:center;gap:10px;padding:11px 17px;border-radius:18px;
      background:linear-gradient(135deg,rgba(12,7,28,0.9),rgba(18,10,42,0.86));
      backdrop-filter:blur(60px) saturate(200%);-webkit-backdrop-filter:blur(60px) saturate(200%);
      border:1px solid rgba(162,130,255,0.24);
      box-shadow:0 8px 44px rgba(0,0,0,0.62),inset 0 1px 0 rgba(200,160,255,0.12)}
    .search-icon{width:15px;height:15px;color:rgba(162,130,255,0.6);flex-shrink:0}
    .search-input{flex:1;background:transparent;border:none;outline:none;
      font-family:"Outfit",sans-serif;font-size:13px;font-weight:300;
      color:rgba(255,255,255,0.9);caret-color:rgba(162,130,255,0.9)}
    .search-input::placeholder{color:rgba(255,255,255,0.2)}
    .search-hint{font-family:"JetBrains Mono",monospace;font-size:9px;color:rgba(162,130,255,0.3);white-space:nowrap;flex-shrink:0}
    .search-results{margin-top:6px;display:none;flex-direction:column;gap:2px;padding:7px;
      border-radius:13px;background:rgba(7,4,18,0.92);backdrop-filter:blur(40px);
      border:1px solid rgba(130,90,255,0.14);box-shadow:0 12px 40px rgba(0,0,0,0.65);
      max-height:150px;overflow-y:auto}
    .search-results.has-results{display:flex}
    .result-item{display:flex;align-items:center;gap:9px;padding:7px 11px;
      border-radius:9px;cursor:pointer;transition:background 0.14s ease}
    .result-item:hover,.result-item.active{background:rgba(130,90,255,0.12)}
    .result-ico{width:28px;height:28px;display:flex;align-items:center;justify-content:center;
      border-radius:7px;background:rgba(130,90,255,0.1);color:rgba(190,165,255,0.78);flex-shrink:0}
    .result-ico svg{width:13px;height:13px}
    .result-label{font-size:0.82rem;color:rgba(238,230,255,0.88);font-weight:400}
    .result-hint{font-size:0.67rem;color:rgba(162,130,255,0.38);font-family:"JetBrains Mono",monospace;margin-left:auto}

    /* ─── Playlist overlay ─── */
    .playlist-panel{width:360px;max-width:90%;
      background:linear-gradient(135deg,rgba(10,6,26,0.92),rgba(16,9,38,0.9));
      backdrop-filter:blur(60px) saturate(180%);-webkit-backdrop-filter:blur(60px) saturate(180%);
      border:1px solid rgba(150,110,255,0.18);border-radius:16px;
      box-shadow:0 12px 48px rgba(0,0,0,0.7),inset 0 1px 0 rgba(200,160,255,0.08);
      overflow:hidden;max-height:170px;display:flex;flex-direction:column}
    .playlist-header{display:flex;align-items:center;justify-content:space-between;
      padding:8px 12px;border-bottom:1px solid rgba(150,110,255,0.1)}
    .playlist-title{font-size:0.75rem;color:rgba(190,165,255,0.75);font-weight:400}
    .playlist-body{flex:1;overflow-y:auto;padding:4px}
    .playlist-body::-webkit-scrollbar{width:3px}
    .playlist-body::-webkit-scrollbar-thumb{background:rgba(150,110,255,0.25);border-radius:2px}
    .pl-item{display:flex;align-items:center;gap:8px;padding:5px 8px;
      border-radius:8px;cursor:pointer;transition:background 0.14s ease}
    .pl-item:hover{background:rgba(130,90,255,0.1)}
    .pl-item.playing{background:rgba(108,92,231,0.15)}
    .pl-item.playing .pl-name{color:rgba(162,155,254,1)}
    .pl-idx{font-size:0.62rem;color:rgba(160,120,255,0.4);font-family:"JetBrains Mono",monospace;min-width:18px;text-align:right}
    .pl-name{font-size:0.75rem;color:rgba(220,210,255,0.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .pl-dur{font-size:0.62rem;color:rgba(160,120,255,0.4);font-family:"JetBrains Mono",monospace;flex-shrink:0}

    @keyframes slideUp{from{opacity:0;transform:translateY(10px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .anim-up{animation:slideUp 0.28s cubic-bezier(0.16,1,0.3,1) both}
  </style>
</head>
<body>
<div class="dock-root">
  <!-- Overlay area (top 200px) -->
  <div class="overlay-area" id="overlay-area">
    <div id="search-wrap" class="search-wrap" style="display:none">
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="search-input" placeholder="Tìm ứng dụng..." autocomplete="off" spellcheck="false"/>
        <span class="search-hint">↑↓ · Enter · ESC</span>
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
    <div id="playlist-wrap" class="playlist-panel" style="display:none">
      <div class="playlist-header">
        <span class="playlist-title">🎵 Playlist (<span id="pl-count">0</span>)</span>
        <button class="icon-btn" id="pl-add-btn" title="Add more files">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="playlist-body" id="pl-body"></div>
    </div>
  </div>

  <!-- Dock bar (bottom 80px) -->
  <div class="dock-bottom">

    <!-- Status -->
    <div class="pill">
      <div class="live-dot"></div>
      <span class="sys-val">Active</span>
    </div>

    <!-- Apps 1 -->
    <div class="pill">
      <button class="app-btn" data-app="explorer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      </button>
      <div class="vsep"></div>
      <button class="app-btn" data-app="browser">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </button>
      <div class="vsep"></div>
      <button class="app-btn" data-app="terminal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="4,17 10,11 4,5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      </button>
      <div class="vsep"></div>
      <button class="app-btn" data-app="vscode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16,18 22,12 16,6"/><polyline points="8,6 2,12 8,18"/></svg>
      </button>
    </div>

    <!-- Clock -->
    <div class="pill pill-clock">
      <div>
        <div class="time-row">
          <span class="time-h" id="t-h">00</span><span class="time-sep">:</span><span class="time-m" id="t-m">00</span><span class="time-s" id="t-s">00</span>
        </div>
        <div class="time-date" id="t-date">---</div>
      </div>
      <div class="clock-sep"></div>
    </div>

    <!-- Apps 2 -->
    <div class="pill">
      <button class="app-btn" data-app="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <div class="vsep"></div>
      <button class="app-btn" data-app="notepad">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </button>
      <div class="vsep"></div>
      <button class="app-btn" data-app="calculator">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="8.01" y2="10"/><line x1="12" y1="10" x2="12.01" y2="10"/><line x1="16" y1="10" x2="16.01" y2="10"/></svg>
      </button>
      <div class="vsep"></div>
      <button class="app-btn" data-app="store">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 7v13a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-3-5z"/><line x1="3" y1="7" x2="21" y2="7"/><path d="M16 11a4 4 0 0 1-8 0"/></svg>
      </button>
    </div>

    <!-- Mini Visualizer -->
    <div class="viz-pill">
      <canvas id="viz-canvas" width="76" height="30"></canvas>
      <button class="icon-btn" id="viz-btn" title="Toggle mic visualizer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
    </div>

    <!-- Music Player -->
    <div class="music-pill">
      <!-- Open files -->
      <button class="icon-btn" id="music-open" title="Open audio files">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </button>
      <!-- Show playlist -->
      <button class="icon-btn" id="pl-btn" title="Show playlist">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
      <div class="vsep"></div>
      <!-- Track info -->
      <div class="music-info">
        <div class="music-title" id="music-title">No track</div>
        <div class="music-sub" id="music-sub">tap 🎵 to load</div>
      </div>
      <div class="vsep"></div>
      <!-- Controls -->
      <button class="icon-btn" id="m-prev">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19,20 9,12 19,4"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
      </button>
      <button class="icon-btn" id="m-play">
        <svg id="play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,3 19,12 5,21"/></svg>
      </button>
      <button class="icon-btn" id="m-next">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </button>
      <div class="vsep"></div>
      <div style="display:flex;flex-direction:column;gap:5px;align-items:center">
        <div class="music-prog-wrap" id="m-prog"><div class="music-prog-bar" id="m-bar" style="width:0%"></div></div>
        <input type="range" class="vol-slider" id="m-vol" min="0" max="100" value="70" title="Volume">
      </div>
    </div>

    <!-- Search + time -->
    <div class="pill">
      <button class="icon-btn" id="search-btn" title="Search (Ctrl+Space)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <div class="vsep"></div>
      <svg class="wifi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 12.55a11 11 0 0 1 14 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="currentColor"/></svg>
      <span class="sys-val" id="mini-time">--:--</span>
    </div>

  </div><!-- /dock-bottom -->
</div><!-- /dock-root -->

<audio id="audio" style="display:none"></audio>

<script>
// ═══════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════
var DAYS = ['CN','T2','T3','T4','T5','T6','T7'];
function pad(n){ return String(n).padStart(2,'0'); }
function tick(){
  var n = new Date();
  document.getElementById('t-h').textContent = pad(n.getHours());
  document.getElementById('t-m').textContent = pad(n.getMinutes());
  document.getElementById('t-s').textContent = pad(n.getSeconds());
  document.getElementById('mini-time').textContent = pad(n.getHours())+':'+pad(n.getMinutes());
  document.getElementById('t-date').textContent = DAYS[n.getDay()]+'  ·  '+pad(n.getDate())+'/'+pad(n.getMonth()+1)+'/'+n.getFullYear();
}
tick(); setInterval(tick, 1000);

// ═══════════════════════════════════════════════
// APP LAUNCHER + SEARCH
// ═══════════════════════════════════════════════
var APPS = [
  {id:'explorer',  label:'File Explorer',   icon:'folder',  hint:'Win+E', key:['file','explorer','thu muc']},
  {id:'browser',   label:'Edge Browser',    icon:'globe',   hint:'',      key:['browser','edge','web','internet']},
  {id:'terminal',  label:'Terminal',         icon:'term',    hint:'',      key:['terminal','cmd','wt']},
  {id:'vscode',    label:'VS Code',          icon:'code',    hint:'',      key:['vscode','code','editor']},
  {id:'settings',  label:'Windows Settings', icon:'gear',    hint:'Win+I', key:['settings','cai dat']},
  {id:'notepad',   label:'Notepad',          icon:'file',    hint:'',      key:['notepad','ghi chu']},
  {id:'calculator',label:'Calculator',       icon:'calc',    hint:'',      key:['calc','may tinh']},
  {id:'store',     label:'Microsoft Store',  icon:'store',   hint:'',      key:['store','cua hang']},

function launchApp(id){ if(window.api && window.api.launchApp) window.api.launchApp(id); }
document.querySelectorAll('.app-btn[data-app]').forEach(function(b){
  b.addEventListener('click',function(){ launchApp(this.getAttribute('data-app')); });
});

// Search
var overlay   = document.getElementById('overlay-area');
var srchWrap  = document.getElementById('search-wrap');
var srchInput = document.getElementById('search-input');
var srchRes   = document.getElementById('search-results');
var searchBtn = document.getElementById('search-btn');
var plWrap    = document.getElementById('playlist-wrap');
var activeIdx = -1;
var srchOpen  = false;

function openOverlay(kind){
  srchWrap.style.display  = kind === 'search'   ? '' : 'none';
  plWrap.style.display    = kind === 'playlist' ? '' : 'none';
  overlay.classList.add('active');
  // Expand dock window upward to 280px so overlay has room
  if (window.api && window.api.dockResize) window.api.dockResize(true);
  if(kind === 'search'){
    srchWrap.classList.add('anim-up');
    setTimeout(function(){ srchWrap.classList.remove('anim-up'); }, 400);
    srchInput.focus();
    srchOpen = true;
  } else {
    plWrap.classList.add('anim-up');
    setTimeout(function(){ plWrap.classList.remove('anim-up'); }, 400);
    srchOpen = false;
  }
}
function closeOverlay(){
  overlay.classList.remove('active');
  srchWrap.style.display = 'none';
  plWrap.style.display   = 'none';
  srchInput.value = '';
  renderResults([]);
  activeIdx = -1;
  srchOpen = false;
  searchBtn.classList.remove('on');
  document.getElementById('pl-btn').classList.remove('on');
  // Collapse dock window back to 80px
  if (window.api && window.api.dockResize) window.api.dockResize(false);
}
function toggleSearch(){
  if(srchOpen || srchWrap.style.display === ''){ closeOverlay(); }
  else { closeOverlay(); openOverlay('search'); searchBtn.classList.add('on'); }
}
function togglePlaylist(){
  if(plWrap.style.display === ''){ closeOverlay(); }
  else { closeOverlay(); openOverlay('playlist'); document.getElementById('pl-btn').classList.add('on'); }
}

searchBtn.addEventListener('click', toggleSearch);
document.getElementById('pl-btn').addEventListener('click', togglePlaylist);

document.addEventListener('keydown', function(e){
  if((e.ctrlKey||e.metaKey) && e.code === 'Space'){ e.preventDefault(); toggleSearch(); return; }
  if(e.code === 'Escape'){ closeOverlay(); return; }
  if(!srchOpen) return;
  var items = srchRes.querySelectorAll('.result-item');
  if(e.code === 'ArrowDown'){ e.preventDefault(); activeIdx=(activeIdx+1)%items.length; items.forEach(function(it,i){it.classList.toggle('active',i===activeIdx);}); }
  else if(e.code === 'ArrowUp'){ e.preventDefault(); activeIdx=(activeIdx-1+items.length)%items.length; items.forEach(function(it,i){it.classList.toggle('active',i===activeIdx);}); }
  else if(e.code === 'Enter'){ var a=srchRes.querySelector('.active'); if(a){launchApp(a.getAttribute('data-app'));closeOverlay();} }
});
srchInput.addEventListener('input', function(){
  var q = this.value.toLowerCase().trim();
  if(!q){ renderResults([]); return; }
  var found = APPS.filter(function(a){ return a.label.toLowerCase().includes(q)||a.key.some(function(k){return k.includes(q);}); });
  renderResults(found); activeIdx = found.length ? 0 : -1;
});
function renderResults(apps){
  srchRes.innerHTML='';
  if(!apps.length){ srchRes.classList.remove('has-results'); return; }
  srchRes.classList.add('has-results');
  apps.forEach(function(app,i){
    var d=document.createElement('div');
    d.className='result-item'+(i===activeIdx?' active':'');
    d.setAttribute('data-app',app.id);
    d.innerHTML='<div class="result-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">'+(SVG[app.icon]||SVG.file)+'</svg></div>'+
      '<span class="result-label">'+app.label+'</span>'+
      (app.hint?'<span class="result-hint">'+app.hint+'</span>':'');
    d.addEventListener('click',function(){launchApp(app.id);closeOverlay();});
    srchRes.appendChild(d);
  });
}

// MINI VISUALIZER
// ═══════════════════════════════════════════════
var vizCanvas = document.getElementById('viz-canvas');
var vizCtx    = vizCanvas.getContext('2d');
var vizBtn    = document.getElementById('viz-btn');
var vizOn     = false;
var vizStream, vizACtx, vizAnalyser, vizRAF;
var smoothBars = new Array(19).fill(0);

function drawIdle(){
  vizCtx.clearRect(0,0,76,30);
  var t = Date.now()*0.0018;
  for(var i=0;i<19;i++){
    var h = (Math.sin(t+i*0.45)*0.28+0.32)*26;
    var g=vizCtx.createLinearGradient(0,30,0,30-h);
    g.addColorStop(0,'rgba(108,92,231,0.28)'); g.addColorStop(1,'rgba(162,155,254,0.48)');
    vizCtx.fillStyle=g; vizCtx.fillRect(i*4,30-h,3,h);
  }
}
function drawLive(){
  vizRAF = requestAnimationFrame(drawLive);
  var d=new Uint8Array(vizAnalyser.frequencyBinCount);
  vizAnalyser.getByteFrequencyData(d);
  vizCtx.clearRect(0,0,76,30);
  for(var i=0;i<19;i++){
    var idx=Math.floor((i/19)*d.length*0.65);
    var target=(d[idx]/255)*28;
    smoothBars[i]=smoothBars[i]*0.72+target*0.28;
    var h=smoothBars[i];
    var g=vizCtx.createLinearGradient(0,30,0,30-h);
    g.addColorStop(0,'#6c5ce7'); g.addColorStop(1,'#a29bfe');
    vizCtx.fillStyle=g;
    vizCtx.shadowBlur=5; vizCtx.shadowColor='rgba(162,155,254,0.4)';
    vizCtx.fillRect(i*4,30-h,3,h);
    vizCtx.shadowBlur=0;
  }
}
(function idleLoop(){ if(!vizOn){drawIdle(); requestAnimationFrame(idleLoop);} })();

vizBtn.addEventListener('click', function(){
  if(vizOn){
    cancelAnimationFrame(vizRAF);
    if(vizStream) vizStream.getTracks().forEach(function(t){t.stop();});
    if(vizACtx) vizACtx.close();
    vizOn=false; vizBtn.classList.remove('on');
    (function idleLoop(){ if(!vizOn){drawIdle(); requestAnimationFrame(idleLoop);} })();
  } else {
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
      vizStream=stream; vizACtx=new AudioContext();
      var src=vizACtx.createMediaStreamSource(stream);
      vizAnalyser=vizACtx.createAnalyser();
      vizAnalyser.fftSize=128; vizAnalyser.smoothingTimeConstant=0.82;
      src.connect(vizAnalyser);
      vizOn=true; vizBtn.classList.add('on'); drawLive();
    }).catch(function(e){console.error('mic denied',e);});
  }
});

// MUSIC PLAYER
// ═══════════════════════════════════════════════
var audio    = document.getElementById('audio');
var playlist = [];
var curIdx   = 0;
var playing  = false;

audio.volume = 0.7;

function fmtTime(s){
  if(!s||isNaN(s)) return '0:00';
  var m=Math.floor(s/60);
  return m+':'+String(Math.floor(s%60)).padStart(2,'0');
}
function setPlayIcon(p){
  document.getElementById('play-icon').innerHTML = p
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="5,3 19,12 5,21"/>';
}

function loadTrack(idx, autoPlay){
  if(!playlist.length) return;
  curIdx = (idx+playlist.length)%playlist.length;
  var t = playlist[curIdx];
  audio.src = 'file://'+t.path;
  document.getElementById('music-title').textContent = t.name;
  document.getElementById('music-sub').textContent = t.ext.toUpperCase()+' · 0:00';
  document.getElementById('m-bar').style.width='0%';
  renderPlaylist();
  if(autoPlay){ audio.play(); playing=true; setPlayIcon(true); }
}

audio.addEventListener('timeupdate',function(){
  if(audio.duration){
    var pct=(audio.currentTime/audio.duration)*100;
    document.getElementById('m-bar').style.width=pct+'%';
    document.getElementById('music-sub').textContent=fmtTime(audio.currentTime)+' / '+fmtTime(audio.duration);
  }
});
audio.addEventListener('ended',function(){ loadTrack(curIdx+1,true); });

document.getElementById('m-prog').addEventListener('click',function(e){
  if(!audio.duration) return;
  var r=this.getBoundingClientRect();
  audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
});
document.getElementById('m-vol').addEventListener('input',function(){ audio.volume=this.value/100; });
document.getElementById('m-play').addEventListener('click',function(){
  if(!playlist.length) return;
  if(playing){ audio.pause(); playing=false; } else { audio.play(); playing=true; }
  setPlayIcon(playing);
});
document.getElementById('m-prev').addEventListener('click',function(){ loadTrack(curIdx-1,playing); });
document.getElementById('m-next').addEventListener('click',function(){ loadTrack(curIdx+1,playing); });

// Open files
async function addFiles(){
  if(!window.api||!window.api.dockOpenAudio) return;
  var paths = await window.api.dockOpenAudio();
  if(!paths||!paths.length) return;
  var added = 0;
  paths.forEach(function(fp){
    var name=fp.split(/[\\/]/).pop();
    var ext=(name.split('.').pop()||'mp3').toLowerCase();
    var base=name.replace(/\.[^.]+$/,'');
    if(!playlist.some(function(p){return p.path===fp;})){
      playlist.push({path:fp,name:base,ext:ext});
      added++;
    }
  });
  if(added && playlist.length===added){
    loadTrack(0,true);
  }
  document.getElementById('pl-count').textContent=playlist.length;
  renderPlaylist();
  if(plWrap.style.display==='none') togglePlaylist();
}
document.getElementById('music-open').addEventListener('click', addFiles);
document.getElementById('pl-add-btn').addEventListener('click', addFiles);

function renderPlaylist(){
  var body=document.getElementById('pl-body');
  body.innerHTML='';
  document.getElementById('pl-count').textContent=playlist.length;
  playlist.forEach(function(t,i){
    var d=document.createElement('div');
    d.className='pl-item'+(i===curIdx?' playing':'');
    d.innerHTML='<span class="pl-idx">'+(i===curIdx?'▶':String(i+1))+'</span>'+
      '<span class="pl-name">'+t.name+'</span>'+
      '<span class="pl-dur">'+t.ext+'</span>';
    d.addEventListener('click',function(){ loadTrack(i,true); closeOverlay(); });
    body.appendChild(d);
  });
  // Scroll to current
  var items=body.querySelectorAll('.pl-item');
  if(items[curIdx]) items[curIdx].scrollIntoView({block:'nearest'});
}
</script>
