<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wallpaper Renderer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      cursor: none;
    }
    #wallpaper-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: #000;
    }

    /* Two layers for crossfade. Layer B sits on top. */
    .wp-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .wp-layer video,
    .wp-layer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }
    .wp-layer canvas {
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
    }

    /* Crossfade: top layer fades in, bottom layer waits */
    #layer-a { z-index: 1; }
    #layer-b { z-index: 2; opacity: 0; transition: opacity 1.2s ease-in-out; }
    #layer-b.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="wallpaper-container">
    <div id="layer-a" class="wp-layer"></div>
    <div id="layer-b" class="wp-layer"></div>
  </div>

  <script>
    var layerA = document.getElementById('layer-a');
    var layerB = document.getElementById('layer-b');

    // Which layer is currently on top (visible, z-index 2)
    var topLayer = layerB;
    var botLayer = layerA;

    var FADE_MS = 1200; // crossfade duration in ms (matches CSS transition)

    // --- Helpers ---
    function clearLayer(layer) {
      var children = Array.from(layer.children);
      children.forEach(function(child) {
        if (child.tagName === 'VIDEO') {
          child.pause();
          child.src = '';
          child.load();
        }
      });
      layer.innerHTML = '';
    }

    function createVideo(path) {
      var video = document.createElement('video');
      video.src = 'file://' + path;
      video.autoplay = true;
      video.loop = true;
      video.muted = true;
      video.playsInline = true;
      video.addEventListener('loadeddata', function() {
        video.play().catch(function() {});
      });
      return video;
    }

    function createImage(path) {
      var img = document.createElement('img');
      img.src = 'file://' + path;
      return img;
    }

    // --- Crossfade transition ---
    // Steps:
    // 1. Load new content into hidden layer
    // 2. Wait for video/image to be ready (canplay / load event)
    // 3. Only THEN fade it in — no flash, no blank frame
    var _swapTimeout = null;
    var _pendingAbort = null; // cancel pending transition

    function transitionTo(type, path) {
      // Abort any pending swap
      if (_swapTimeout) { clearTimeout(_swapTimeout); _swapTimeout = null; }
      if (_pendingAbort) { _pendingAbort(); _pendingAbort = null; }

      // Determine the "next" layer (currently hidden one)
      var nextLayer = (topLayer === layerB) ? layerA : layerB;
      var prevLayer = topLayer;

      // Load content into the next layer (currently behind / invisible)
      clearLayer(nextLayer);
      var el = (type === 'image' || type === 'gif') ? createImage(path) : createVideo(path);
      nextLayer.appendChild(el);

      var aborted = false;
      _pendingAbort = function() { aborted = true; };

      function doFade() {
        if (aborted) return;
        _pendingAbort = null;

        // Bring next layer to front
        nextLayer.style.zIndex = '2';
        prevLayer.style.zIndex = '1';

        // Force reflow so CSS transition fires
        void nextLayer.offsetWidth;

        if (nextLayer === layerB) {
          layerB.classList.add('visible');
        } else {
          layerA.style.opacity = '1';
          layerB.classList.remove('visible');
        }

        // After fade completes, clean up old layer
        _swapTimeout = setTimeout(function() {
          if (aborted) return;
          clearLayer(prevLayer);
          prevLayer.style.zIndex = '';
          _swapTimeout = null;
        }, FADE_MS + 200);

        // Update tracking
        topLayer = nextLayer;
        botLayer = prevLayer;
      }

      // Wait until media is ready before fading
      if (el.tagName === 'VIDEO') {
        el.addEventListener('canplay', function onReady() {
          el.removeEventListener('canplay', onReady);
          doFade();
        }, { once: true });
        // Fallback: if canplay doesn't fire in 3s, fade anyway
        var fallback = setTimeout(function() { doFade(); }, 3000);
        var origAbort = _pendingAbort;
        _pendingAbort = function() { aborted = true; clearTimeout(fallback); if(origAbort) origAbort(); };
      } else {
        // Image
        if (el.complete) {
          doFade();
        } else {
          el.addEventListener('load', function() { doFade(); }, { once: true });
          el.addEventListener('error', function() { doFade(); }, { once: true });
        }
      }
    }

    // Reset layerA opacity management on first call
    layerA.style.transition = 'opacity ' + (FADE_MS / 1000) + 's ease-in-out';
    layerA.style.opacity = '1';

    var currentElement = null;

    // Control playing video (pause/play)
    function getActiveVideo() {
      var top = topLayer;
      return top.querySelector('video');
    }

    // --- IPC Listeners ---
    if (window.api) {
      window.api.onLoadWallpaper(function(_event, data) {
        var type = data.type || 'video';
        transitionTo(type, data.path);
      });

      window.api.onWallpaperControl(function(_event, action) {
        var vid = getActiveVideo();
        if (vid) {
          if (action === 'pause') vid.pause();
          else if (action === 'play') vid.play().catch(function() {});
        }
      });
    }
  </script>
</body>
</html>
